---
layout: default
title: Allt RAG
---

<div class="archive">
  <h1 class="archive__title">Senaste inläggen</h1>
  <div id="posts-grid" class="entries-list">
    <p>Laddar inlägg...</p>
  </div>
</div>

<script src="{{ site.baseurl }}/config.js"></script>
<script>
  function toSlug(str) {
    return str
      .toLowerCase()
      .replace(/[åä]/g, 'a')
      .replace(/ö/g, 'o')
      .replace(/é/g, 'e')
      .replace(/[^a-z0-9]+/g, '-')
      .replace(/^-|-$/g, '');
  }

  async function loadPosts() {
    const res = await fetch(`${SUPABASE_URL}/rest/v1/blog_posts?select=*&order=published_at.desc`, {
      headers: {
        'apikey': SUPABASE_ANON_KEY,
        'Authorization': `Bearer ${SUPABASE_ANON_KEY}`
      }
    });
    const posts = await res.json();
    const container = document.getElementById('posts-grid');
    container.innerHTML = posts.map(post => `
      <div class="list__item">
        <article class="archive__item">
          ${post.image_url ? `<div class="archive__item-teaser">
            <img src="${post.image_url}" alt="${post.title}">
          </div>` : ''}
          <h2 class="archive__item-title">
            <a href="{{ site.baseurl }}/post.html?slug=${toSlug(post.title)}">${post.title}</a>
          </h2>
          <p class="archive__item-excerpt">${post.ingress}</p>
          <p class="page__meta">
            <time>${new Date(post.published_at).toLocaleDateString('sv-SE')}</time>
          </p>
        </article>
      </div>
    `).join('');
  }

  loadPosts();
</script>
