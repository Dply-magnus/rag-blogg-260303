---
layout: default
title: Inlägg
---

<div id="post" class="page">
  <p>Laddar...</p>
</div>

<script src="{{ site.baseurl }}/config.js"></script>
<script>
  function toSlug(str) {
    return str
      .toLowerCase()
      .replace(/[åä]/g, 'a')
      .replace(/ö/g, 'o')
      .replace(/é/g, 'e')
      .replace(/[^a-z0-9]+/g, '-')
      .replace(/^-|-$/g, '');
  }

  async function loadPost() {
    const params = new URLSearchParams(window.location.search);
    const slug = params.get('slug');
    const id = params.get('id');

    let url;
    if (id) {
      url = `${SUPABASE_URL}/rest/v1/blog_posts?id=eq.${id}&select=*`;
    } else {
      url = `${SUPABASE_URL}/rest/v1/blog_posts?select=*`;
    }

    const res = await fetch(url, {
      headers: {
        'apikey': SUPABASE_ANON_KEY,
        'Authorization': `Bearer ${SUPABASE_ANON_KEY}`
      }
    });
    const posts = await res.json();

    const post = id ? posts[0] : posts.find(p => toSlug(p.title) === slug);

    if (!post) {
      document.getElementById('post').innerHTML = '<p>Inlägget hittades inte.</p>';
      return;
    }

    document.title = post.title + ' | AI-blogg';

    document.getElementById('post').innerHTML = `
      <article class="page" itemscope itemtype="https://schema.org/BlogPosting">
        <meta itemprop="headline" content="${post.title}">
        <div class="page__inner-wrap">
          <header>
            <h1 class="page__title" itemprop="headline">${post.title}</h1>
            <p class="page__meta">
              <time datetime="${post.published_at}">${new Date(post.published_at).toLocaleDateString('sv-SE')}</time>
            </p>
          </header>
          <section class="page__content" itemprop="text">
            ${post.image_url ? `<figure>
              <img src="${post.image_url}" alt="${post.title}" class="align-center">
            </figure>` : ''}
            <p><em>${post.ingress}</em></p>
            ${post.body_html}
            ${post.links_html ? post.links_html : ''}
          </section>
        </div>
      </article>
    `;
  }

  loadPost();
</script>
