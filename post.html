---
layout: default
title: Inlägg
---

<div id="post">
  <p>Laddar...</p>
</div>

<hr style="margin: 2rem 0;">

<aside id="recent-aside" style="display:none;">
  <h3 style="font-size:1.1rem; font-weight:700; margin-bottom:0.75rem;">Senaste artiklarna</h3>
  <ul id="recent-posts" style="list-style:none; padding:0; margin:0 0 1rem 0;"></ul>
  <a href="{{ site.baseurl }}/" style="font-size:0.9rem; font-weight:600;">Visa alla →</a>
</aside>

<script src="{{ site.baseurl }}/config.js"></script>
<script>
  function toSlug(str) {
    return str
      .toLowerCase()
      .replace(/[åä]/g, 'a')
      .replace(/ö/g, 'o')
      .replace(/é/g, 'e')
      .replace(/[^a-z0-9]+/g, '-')
      .replace(/^-|-$/g, '');
  }

  async function loadPost() {
    const params = new URLSearchParams(window.location.search);
    const slug = params.get('slug');
    const id = params.get('id');

    const allRes = await fetch(`${SUPABASE_URL}/rest/v1/blog_posts?select=*&order=published_at.desc`, {
      headers: {
        'apikey': SUPABASE_ANON_KEY,
        'Authorization': `Bearer ${SUPABASE_ANON_KEY}`
      }
    });
    const allPosts = await allRes.json();

    const post = id
      ? allPosts.find(p => p.id === parseInt(id))
      : allPosts.find(p => toSlug(p.title) === slug);

    if (!post) {
      document.getElementById('post').innerHTML = '<p>Inlägget hittades inte.</p>';
      return;
    }

    document.title = post.title + ' | Allt RAG';

    document.getElementById('post').innerHTML = `
      <article class="page" itemscope itemtype="https://schema.org/BlogPosting">
        <meta itemprop="headline" content="${post.title}">
        <div class="page__inner-wrap">
          <header>
            <h1 class="page__title" itemprop="headline">${post.title}</h1>
            <p class="page__meta">
              <time datetime="${post.published_at}">${new Date(post.published_at).toLocaleDateString('sv-SE')}</time>
            </p>
          </header>
          <section class="page__content" itemprop="text">
            ${post.image_url ? `<figure>
              <img src="${post.image_url}" alt="${post.title}" class="align-center">
            </figure>` : ''}
            <p><em>${post.ingress}</em></p>
            ${post.body_html}
            ${post.links_html ? post.links_html : ''}
          </section>
        </div>
      </article>
    `;

    const recentPosts = allPosts
      .filter(p => p.id !== post.id)
      .slice(0, 10);

    if (recentPosts.length > 0) {
      document.getElementById('recent-aside').style.display = 'block';
      document.getElementById('recent-posts').innerHTML = recentPosts.map(p => `
        <li style="margin-bottom:0.5rem;">
          <a href="{{ site.baseurl }}/post.html?slug=${toSlug(p.title)}" style="font-size:0.9rem;">${p.title}</a>
          <time style="display:block; font-size:0.75rem; color:#999;">${new Date(p.published_at).toLocaleDateString('sv-SE')}</time>
        </li>
      `).join('');
    }
  }

  loadPost();
</script>
